name: CI — Docs (gh-pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/ci-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'

defaults:
  run:
    working-directory: docs

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (gh-pages base-href)
        run: npx ng build --configuration production --base-href /mfe-starter-kit/

      # gh-pages serves 404.html for direct URL access — copy index.html so deep links work
      - name: Copy index.html → 404.html
        run: cp dist/mfe-docs/browser/index.html dist/mfe-docs/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/dist/mfe-docs/browser
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
