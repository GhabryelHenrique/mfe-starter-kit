# ci-checkout.yml — CI/CD para o mfe-checkout (remote).
# Mesmo padrão do ci-products.yml — consulte aquele arquivo para comentários detalhados.

name: CI — Checkout Remote

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/mfe-checkout/**'
      - 'packages/mfe-contracts/src/**'
      - '.github/workflows/ci-checkout.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/mfe-checkout/**'

defaults:
  run:
    working-directory: packages/mfe-checkout

jobs:
  build:
    name: Build & Deploy Checkout Remote
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install & build @org/contracts
        working-directory: packages/mfe-contracts
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy & update manifest (placeholder)
        run: |
          echo "1. Deploy dist/mfe-checkout/browser para seu CDN"
          echo "2. Atualize packages/mfe-shell/public/federation.manifest.prod.json com a nova URL"
        if: github.event_name == 'push'
